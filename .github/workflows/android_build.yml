name: Build Android APK
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install Dependencies
        run: |
          cd "Basma Game"
          bun install

      - name: Build Web Assets
        run: |
          cd "Basma Game"
          bun x vite build

      - name: Sync Capacitor
        run: |
          cd "Basma Game"
          npx cap sync android

      - name: Build APK
        run: |
          cd "Basma Game/android"
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Basma-Android-App
          path: Basma Game/android/app/build/outputs/apk/debug/app-debug.apk